<h2>Admin Dashboard</h2>

<p><a href="/dashboard">Back to Dashboard</a></p>

<table>
  <tr>
    <th>ID</th>
    <th>Username</th>
    <th>Role</th>
  </tr>
  {% for u in users %}
  <tr>
    <td>{{ u["id"] }}</td>
    <td>{{ u["username"] }}</td>
    <td>{{ u["role"] }}</td>
  </tr>
  {% endfor %}
</table>
